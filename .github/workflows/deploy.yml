name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  # ── 1. Deploy Flask API ──────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Flask)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: BackendAPI
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}

  # ── 2. Deploy React Frontend (runs after backend) ───────────────────────────
  deploy-frontend:
    name: Deploy Frontend (React)
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes --build-env REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}
        working-directory: Frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
